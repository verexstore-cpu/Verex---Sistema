    <title>VEREX · Catálogo</title>

    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Segoe UI',sans-serif;background:#f0f2f5;min-height:100vh;}

        header{background:#111;text-align:center;padding:10px 16px;}
        header img.logo{width:260px;max-width:80vw;display:block;margin:0 auto;}

        .info-bar{
            background:#fff;border-bottom:1px solid #e2e2e2;
            padding:10px 16px;text-align:center;font-size:13px;color:#555;
        }
        .info-bar strong{color:#111;}
        .validez{color:#f97316;font-weight:700;font-size:12px;margin-top:4px;}

        .grid{
            display:grid;grid-template-columns:repeat(2,1fr);
            gap:12px;padding:16px;max-width:580px;margin:0 auto;
        }

        .card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 2px 10px rgba(0,0,0,.08);display:flex;flex-direction:column;}
        .card-img{width:100%;aspect-ratio:1/1;object-fit:contain;background:#f7f7f7;display:block;flex-shrink:0;}
        .card-img-ph{
            width:100%;aspect-ratio:1/1;background:#f0f0f0;
            display:flex;align-items:center;justify-content:center;
            font-size:36px;color:#ccc;flex-shrink:0;
        }
        .card-body{padding:10px;text-align:center;flex:1;}
        .card-name{font-size:12px;font-weight:700;color:#1a1a1a;line-height:1.3;margin-bottom:3px;}
        .card-material{font-size:11px;color:#6b7280;font-weight:600;margin-bottom:5px;}
        .card-price{font-size:16px;font-weight:800;color:#111;margin-bottom:4px;}
        .card-price-orig{font-size:12px;font-weight:600;color:#9ca3af;text-decoration:line-through;}
        .card-price-final{font-size:17px;font-weight:800;color:#92400e;}
        .card-ne{display:inline-block;font-size:10px;font-weight:700;color:#92400e;background:#fef3c7;border:1px solid #fcd34d;border-radius:5px;padding:2px 7px;margin-bottom:4px;line-height:1.5;}
        .card-nota{display:inline-block;font-size:10px;font-weight:700;color:#92400e;background:#fef3c7;border:1px solid #fcd34d;border-radius:5px;padding:2px 7px;margin-top:5px;line-height:1.5;}
        .card-footer{padding:0 10px 10px;}
        .wa-order{
            display:block;width:100%;text-align:center;
            background:#25D366;color:#fff;
            padding:9px 0;border-radius:8px;
            font-size:13px;font-weight:700;
            border:none;cursor:pointer;
        }

        /* Agotado (verificado en tiempo real contra el stock actual) */
        .card.agotado{opacity:.6;}
        .card.agotado .card-img,.card.agotado .card-img-ph{filter:grayscale(1);}
        .card-agotado-badge{
            display:none;position:absolute;top:8px;left:8px;
            background:#ef4444;color:#fff;font-size:10px;font-weight:800;
            padding:3px 8px;border-radius:5px;letter-spacing:.3px;z-index:2;
        }
        .card.agotado .card-agotado-badge{display:block;}
        .card.agotado .wa-order{background:#9ca3af;cursor:not-allowed;}
        .card-img-wrap{position:relative;}

        /* Vencido */
        .expired{
            display:flex;flex-direction:column;align-items:center;
            justify-content:center;text-align:center;
            padding:60px 30px;min-height:65vh;
        }
        .exp-icon{font-size:64px;margin-bottom:20px;}
        .expired h2{font-size:22px;font-weight:800;color:#1a1a1a;margin-bottom:10px;}
        .expired p{font-size:14px;color:#666;margin-bottom:28px;line-height:1.6;max-width:280px;}
        .wa-btn{
            display:inline-flex;align-items:center;gap:8px;
            background:#25D366;color:#fff;padding:14px 28px;
            border-radius:10px;font-size:15px;font-weight:700;
            text-decoration:none;
        }

        footer{text-align:center;padding:20px;font-size:11px;color:#aaa;}
        #loading{text-align:center;padding:80px 20px;color:#888;font-size:14px;}
        @media(max-width:340px){.grid{grid-template-columns:1fr;}}

        /* Selector de talla */
        #sz-overlay{
            display:none;position:fixed;inset:0;
            background:rgba(0,0,0,.5);z-index:999;
            align-items:flex-end;justify-content:center;
        }
        #sz-overlay.open{display:flex;}
        #sz-box{
            background:#fff;border-radius:16px 16px 0 0;
            padding:20px 16px 32px;width:100%;max-width:480px;
            max-height:90vh;overflow-y:auto;
        }
        .sz-btn{
            padding:8px 10px;border:2px solid #e2e2e2;border-radius:8px;
            font-weight:700;font-size:13px;background:#fff;cursor:pointer;min-width:44px;
        }
        .sz-btn.sel-d{background:#7c3aed;border-color:#7c3aed;color:#fff;}
        .sz-btn.sel-h{background:#0277bd;border-color:#0277bd;color:#fff;}
    </style>
</head>
<body>
<div id="app"><div id="loading">Cargando catálogo…</div></div>

<!-- Selector de talla -->
<div id="sz-overlay">
    <div id="sz-box">
        <div id="sz-title" style="font-weight:800;font-size:15px;color:#111;text-align:center;margin-bottom:4px;line-height:1.3;"></div>
        <div id="sz-sub" style="font-size:12px;color:#888;text-align:center;margin-bottom:18px;"></div>

        <div id="sz-sec-d">
            <div id="sz-lbl-d" style="font-size:12px;font-weight:700;color:#7c3aed;margin-bottom:8px;"></div>
            <div id="sz-grid-d" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;"></div>
        </div>

        <div id="sz-sec-h" style="display:none;">
            <div style="font-size:12px;font-weight:700;color:#0277bd;margin-bottom:8px;">Talla caballero</div>
            <div id="sz-grid-h" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:18px;"></div>
        </div>

        <button id="sz-confirm" onclick="confirmarTalla()"
            style="width:100%;background:#25D366;color:#fff;border:none;padding:13px;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;opacity:.5;"
            disabled>💬 Enviar por WhatsApp</button>
        <button onclick="cerrarTallas()"
            style="width:100%;background:#f0f2f5;color:#555;border:none;padding:11px;border-radius:10px;font-size:14px;cursor:pointer;">
            Cancelar</button>
    </div>
</div>

<script>
(function(){
    const params = new URLSearchParams(location.search);
    const c = params.get("c");

    let _prods = [], _waNum = "", _szIdx = -1, _szD = "", _szH = "", _descPct = 0, _afiliadoCodigo = "";

    const SIZES   = ["5","5.5","6","6.5","7","7.5","8","8.5","9","9.5","10","10.5","11","12","13","14"];
    const ES_PAR  = /matrimonio|argolla|novios|pareja|alianza/i;
    const API_URL = "https://verex-api.verexstore.workers.dev/";

    function esc(s){
        const d=document.createElement("div"); d.textContent=String(s||""); return d.innerHTML;
    }

    // Registro silencioso del interés del cliente ANTES de abrir WhatsApp — no bloquea
    // la apertura del chat aunque falle (la venta nunca debe depender de esto).
    function registrarLead(p){
        if (!_afiliadoCodigo || !p?.c) return;
        try {
            fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    accion: "REGISTRAR_LEAD",
                    afiliado: _afiliadoCodigo,
                    codigo: p.c,
                    nombre: p.n || "",
                    precio: precioFinal(p.p),
                    foto: p.i || ""
                })
            }).catch(()=>{});
        } catch(_){}
    }

    function precioFinal(precio){
        const n = parseFloat(precio) || 0;
        if (!_descPct) return n;
        return Math.round(n * (1 - _descPct / 100) * 100) / 100;
    }

    function showExpired(nombre, wa){
        document.getElementById("app").innerHTML=`
            <header><img class="logo" src="/images/logo.webp" alt="VEREX"></header>
            <div class="expired">
                <div class="exp-icon">⏰</div>
                <h2>Este catálogo ya venció</h2>
                <p>Hola${nombre?' <strong>'+esc(nombre)+'</strong>':''}, este catálogo ya no está disponible.<br>
                Contáctanos para ver el inventario actualizado.</p>
                <a href="https://wa.me/${esc(wa||'')}" class="wa-btn">📱 Contactar por WhatsApp</a>
            </div>
            <footer>VEREX · La expresión de tu mejor versión</footer>`;
    }

    function render(data){
        _prods = data.prods || [];
        _waNum = data.wa    || "";
        _descPct = Math.min(90, Math.max(0, parseInt(data.descPct) || 0));
        _afiliadoCodigo = data.afiliadoCodigo || "";

        const exp    = new Date(data.expiry);
        const expStr = exp.toLocaleDateString("es-CO",{day:"numeric",month:"long",year:"numeric"});
        const nb     = data.nombre||"";
        const talla  = data.talla||"";

        let subParts=[];
        if(nb)    subParts.push(`${data.afiliado?'Distribuidor:':'Para:'} <strong>${esc(nb)}</strong>`);
        if(talla) subParts.push(`Talla: <strong>${esc(talla)}</strong>`);
        const subHTML = subParts.join(" &nbsp;·&nbsp; ");

        const szChip = sz => `<span style="padding:2px 7px;background:#e8f4fd;border-radius:5px;font-size:10px;font-weight:700;color:#0277bd;">T${sz}</span>`;
        const cards = _prods.map((p,i)=>{
            let sizesHtml = "";
            if (p.cat === "AN") {
                if (p.par && (p.sizesD?.length || p.sizesH?.length)) {
                    sizesHtml = `<div style="margin:5px 0;font-size:10px;line-height:1.8;">
                        ${p.sizesD?.length ? `<div><span style="color:#9333ea;font-weight:700;">Dama:</span> ${p.sizesD.map(szChip).join(" ")}</div>` : ""}
                        ${p.sizesH?.length ? `<div><span style="color:#2563eb;font-weight:700;">Caballero:</span> ${p.sizesH.map(szChip).join(" ")}</div>` : ""}
                    </div>`;
                } else if (p.sizes?.length) {
                    sizesHtml = `<div style="display:flex;flex-wrap:wrap;gap:3px;justify-content:center;margin:5px 0;">${p.sizes.map(szChip).join("")}</div>`;
                }
            }
            return `
            <div class="card" data-idx="${i}" data-cod="${esc(p.c||'')}">
                <div class="card-img-wrap">
                    <span class="card-agotado-badge">AGOTADO</span>
                    ${p.i
                        ?`<img class="card-img" src="${esc(p.i)}" alt="${esc(p.n)}" loading="lazy" onerror="this.outerHTML='<div class=\'card-img-ph\'>💍</div>'">`
                        :`<div class="card-img-ph">💍</div>`}
                </div>
                <div class="card-body">
                    <div class="card-name">${esc(p.n)}</div>
                    ${p.m?`<div class="card-material">${esc(p.m)}</div>`:''}
                    ${sizesHtml}
                    ${p.ne?`<div class="card-ne">♦ ${esc(p.ne)}</div>`:''}
                    <div class="card-price">${(() => {
                        const totalSet = (p.par && p.pD != null && p.pH != null)
                            ? parseFloat(p.pD) + parseFloat(p.pH) : null;
                        if (totalSet != null) {
                            const piezas = p.piezas || 2;
                            const nDama = piezas - 1; // hoy: 1 o 2 anillos dama + 1 caballero
                            const label = piezas === 2
                                ? "Precio del par (dama + caballero)"
                                : piezas === 3
                                    ? "Precio del trío (2 anillos dama + 1 caballero)"
                                    : `Precio del set (${piezas} piezas)`;
                            const precioTxt = _descPct
                                ? `<span class="card-price-orig">$${totalSet.toFixed(2)}</span> <span class="card-price-final">$${precioFinal(totalSet).toFixed(2)}</span>`
                                : `$${totalSet.toFixed(2)}`;
                            return `${precioTxt}<span style="display:block;font-size:10px;font-weight:700;color:#7c3aed;margin-top:2px;">${label}</span>
                                <span style="display:block;font-size:10px;font-weight:500;color:#9ca3af;margin-top:1px;">Dama $${parseFloat(p.pD).toFixed(2)}${nDama>1?` (${nDama} piezas)`:""} · Caballero $${parseFloat(p.pH).toFixed(2)}</span>`;
                        }
                        const base = _descPct
                            ? `<span class="card-price-orig">$${esc(p.p)}</span> <span class="card-price-final">$${precioFinal(p.p).toFixed(2)}</span>`
                            : `$${esc(p.p)}`;
                        return `${base}${p.par?`<span style="display:block;font-size:10px;font-weight:500;color:#7c3aed;margin-top:2px;">Precio por pieza</span>`:""}`;
                    })()}</div>
                    ${p.nota?`<div class="card-nota">${esc(p.nota)}</div>`:''}
                </div>
                <div class="card-footer">
                    <button class="wa-order" onclick="elegirTalla(${i})">💬 Quiero este</button>
                </div>
            </div>`;
        }).join("");

        const b = data.banner;
        const bannerHTML = b?.txt ? `
            <div style="background:${esc(b.color||'#ef4444')};color:#fff;text-align:center;padding:14px 20px;">
                <div style="font-size:16px;font-weight:900;letter-spacing:.5px;line-height:1.3;">${esc(b.txt)}</div>
                ${b.sub?`<div style="font-size:12px;font-weight:500;margin-top:4px;opacity:.9;">${esc(b.sub)}</div>`:''}
            </div>` : '';

        document.getElementById("app").innerHTML=`
            <header><img class="logo" src="/images/logo.webp" alt="VEREX"></header>
            ${bannerHTML}
            <div class="info-bar">
                ${subHTML?`<div>${subHTML}</div>`:''}
                <div class="validez">⏰ Válido hasta: ${expStr}</div>
            </div>
            <div class="grid">${cards}</div>
            <footer>VEREX · La expresión de tu mejor versión</footer>`;
    }

    /* ── Selector de talla ── */

    function elegirTalla(i){
        const p = _prods[i];
        if(!p) return;
        if(p._agotado){ alert("Este producto ya no está disponible — el stock se agotó."); return; }

        const esPareja = ES_PAR.test(p.n) || p.par;

        // Argollas de par y productos sin talla: ir directo a WhatsApp
        if(esPareja){
            const sizesInfo = [
                p.sizesD?.length ? `Dama: ${p.sizesD.map(s=>'T'+s).join(', ')}` : '',
                p.sizesH?.length ? `Caballero: ${p.sizesH.map(s=>'T'+s).join(', ')}` : ''
            ].filter(Boolean).join('\n');
            const precioInfo = (p.pD && p.pH && p.pD !== p.pH)
                ? `Precio dama: $${precioFinal(p.pD).toFixed(2)} por pieza\nPrecio caballero: $${precioFinal(p.pH).toFixed(2)} por pieza`
                : `Precio individual: $${precioFinal(p.p).toFixed(2)} por pieza`;
            const msg = `Hola, me interesan estas argollas del catálogo VEREX:\n\n${p.n}\n${precioInfo}${sizesInfo ? `\n\nTallas disponibles:\n${sizesInfo}` : ''}\n\n¿Qué tallas necesita para dama y caballero?`;
            registrarLead(p);
            window.open(`https://wa.me/${_waNum}?text=${encodeURIComponent(msg)}`,"_blank");
            return;
        }

        if(p.cat && p.cat !== "AN"){
            const msg=`Hola, me interesa este producto del catálogo VEREX:\n\n${p.n}\nPrecio: $${precioFinal(p.p).toFixed(2)}`;
            registrarLead(p);
            window.open(`https://wa.me/${_waNum}?text=${encodeURIComponent(msg)}`,"_blank");
            return;
        }

        _szIdx=i; _szD=""; _szH="";

        const availD = (p.sizes?.length ? p.sizes : SIZES);

        document.getElementById("sz-title").textContent = p.n;
        document.getElementById("sz-sub").textContent   = "¿Qué talla necesitas?";
        document.getElementById("sz-lbl-d").textContent = "Tu talla";
        document.getElementById("sz-sec-h").style.display = "none";

        document.getElementById("sz-grid-d").innerHTML = availD.map(sz=>
            `<button class="sz-btn" onclick="selSz('D','${sz}',this)">T${sz}</button>`
        ).join("");

        const btn = document.getElementById("sz-confirm");
        btn.disabled=true; btn.style.opacity=".5";
        document.getElementById("sz-overlay").classList.add("open");
    }

    function selSz(gen, sz, el){
        document.querySelectorAll("#sz-grid-d .sz-btn").forEach(b=>b.classList.remove("sel-d"));
        el.classList.add("sel-d");
        _szD = sz;
        const btn = document.getElementById("sz-confirm");
        btn.disabled=false; btn.style.opacity="1";
    }

    function confirmarTalla(){
        const p = _prods[_szIdx];
        const msg = `Hola, me interesa este producto del catálogo VEREX:\n\n${p.n}\nPrecio: $${precioFinal(p.p).toFixed(2)}\nTalla: T${_szD}`;
        registrarLead(p);
        cerrarTallas();
        window.open(`https://wa.me/${_waNum}?text=${encodeURIComponent(msg)}`,"_blank");
    }

    function cerrarTallas(){
        document.getElementById("sz-overlay").classList.remove("open");
    }

    // Verifica el stock real contra el catálogo (que es una foto fija tomada al
    // generar el link) y marca "AGOTADO" lo que ya se vendió por otro canal
    // (consignación, ecommerce u otro afiliado) desde entonces.
    async function actualizarDisponibilidad(){
        try{
            const res = await fetch(API_URL, {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body: JSON.stringify({ accion:"GET_STOCK" })
            });
            const data = await res.json();
            const stock = data.stock || [];
            const mapa = new Map(stock.map(s => [s.codigo, s]));

            _prods.forEach((p,i) => {
                if(!p.c) return;
                const s = mapa.get(p.c);
                // Si el código ya no existe en stock (eliminado) o quedó sin
                // unidades disponibles o fue reservado, se marca agotado.
                const agotado = !s || s.reservado || (parseInt(s.stock_total)||0) <= 0;
                if(!agotado) return;
                p._agotado = true;
                // Ocultar en vez de tachar — más limpio para el cliente, y evita
                // que quede un producto "muerto" ocupando espacio en la lista.
                const card = document.querySelector(`.card[data-idx="${i}"]`);
                if(card) card.style.display = "none";
            });
        } catch(_){ /* si falla la verificación, se deja el catálogo como estaba */ }
    }

    window.elegirTalla    = elegirTalla;
    window.selSz          = selSz;
    window.confirmarTalla = confirmarTalla;
    window.cerrarTallas   = cerrarTallas;

    /* ── Arranque ── */

    let data;
    // KV route: data injected server-side
    if(window.__CATALOG_DATA__){
        data = window.__CATALOG_DATA__;
    } else {
        if(!c){
            document.getElementById("app").innerHTML='<div style="text-align:center;padding:60px;color:#888;">Link inválido.</div>';
            return;
        }
        try{
            // Try LZ-string URL-safe (new), then base64 LZ-string, then plain base64 (legacy)
            const lzUri = LZString.decompressFromEncodedURIComponent(c);
            if(lzUri){ data=JSON.parse(lzUri); }
            else {
                const raw=decodeURIComponent(c);
                const lzB64=LZString.decompressFromBase64(raw);
                data=lzB64 ? JSON.parse(lzB64) : JSON.parse(decodeURIComponent(escape(atob(raw))));
            }
        } catch(e){
            document.getElementById("app").innerHTML='<div style="text-align:center;padding:60px;color:#888;">Link inválido o corrupto.</div>';
            return;
        }
    }
    if(data.expiry && Date.now()>data.expiry) showExpired(data.nombre, data.wa);
    else { render(data); actualizarDisponibilidad(); }
})();
</script>
</body>
</html>
