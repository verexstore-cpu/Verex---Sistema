name: Deploy Admin VEREX → GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - '_admin-repo/**'
  workflow_dispatch:   # permite lanzarlo manualmente desde GitHub o API

# Permisos necesarios para publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Solo un deploy a la vez
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Subir carpeta _admin-repo como artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_admin-repo'

      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
